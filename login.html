<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول | MIKO HOST</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #03050b);
            position: relative;
            overflow-x: hidden;
        }

        .bg-particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            background: rgba(45, 122, 255, 0.2);
            border-radius: 50%;
            animation: float 12s infinite ease-in-out;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .auth-wrapper {
            width: 100%;
            max-width: 450px;
            margin: 20px;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: rgba(12, 18, 28, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            border: 1px solid rgba(45, 122, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            padding: 40px 36px;
            transition: all 0.3s;
        }
        .glass-card:hover {
            border-color: rgba(45, 122, 255, 0.7);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #0f172a, #0a0f1c);
            border: 1px solid #00e5ff;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            color: #00e5ff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #2d7aff, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(45,122,255,0.3);
        }
        .logo-sub {
            font-size: 11px;
            color: #7a8099;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .tabs {
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px;
            border-radius: 80px;
            margin-bottom: 32px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            color: #9ca3cf;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #2d7aff, #1a5cd8);
            color: white;
            box-shadow: 0 6px 14px rgba(45, 122, 255, 0.4);
        }

        .form-container {
            display: none;
            animation: fade 0.4s ease;
        }
        .form-container.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }
        .input-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #5b6e8c;
            font-size: 18px;
            transition: color 0.2s;
            pointer-events: none;
        }
        .input-group input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(45, 122, 255, 0.4);
            border-radius: 60px;
            color: #fff;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
            outline: none;
            transition: all 0.3s;
        }
        .input-group input:focus {
            border-color: #2d7aff;
            background: rgba(45, 122, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(45, 122, 255, 0.15);
        }
        .input-group input:focus + i {
            color: #2d7aff;
        }
        .toggle-pwd {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #5b6e8c;
            cursor: pointer;
            font-size: 18px;
            transition: color 0.2s;
        }
        .toggle-pwd:hover {
            color: #2d7aff;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 0.8rem;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #b9c3e0;
        }
        .checkbox-label input {
            width: 16px;
            height: 16px;
            accent-color: #2d7aff;
            cursor: pointer;
        }
        .forgot-link {
            color: #2d7aff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }
        .forgot-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        .action-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2d7aff, #1a5cd8);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 800;
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(45, 122, 255, 0.3);
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(45, 122, 255, 0.5);
        }

        .message {
            padding: 12px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 24px;
            display: none;
            animation: shake 0.3s ease;
        }
        .message.error {
            background: rgba(255, 61, 90, 0.15);
            border: 1px solid rgba(255, 61, 90, 0.4);
            color: #ff8a9e;
        }
        .message.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #8effc2;
        }
        @keyframes shake {
            0%,100%{ transform: translateX(0); }
            25%{ transform: translateX(-4px); }
            75%{ transform: translateX(4px); }
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 11px;
            color: #5b6e8c;
        }
        .footer a {
            color: #2d7aff;
            text-decoration: none;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .loading-overlay.active {
            display: flex;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(45, 122, 255, 0.3);
            border-top-color: #2d7aff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 16px;
            color: #2d7aff;
            font-weight: 500;
        }

        @media (max-width: 550px) {
            .glass-card {
                padding: 32px 24px;
            }
            .logo-text {
                font-size: 22px;
            }
            .tab-btn {
                padding: 10px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="bg-particles" id="particles"></div>

<div class="auth-wrapper">
    <div class="glass-card">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <div class="logo-text">MIKO HOST</div>
            <div class="logo-sub">BY @I_tt_6</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="loginTabBtn">تسجيل الدخول</button>
            <button class="tab-btn" id="registerTabBtn">إنشاء حساب</button>
        </div>

        <div id="loginForm" class="form-container active">
            <div id="loginMessage" class="message"></div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="loginUsername" placeholder="اسم المستخدم" autocomplete="username">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="كلمة المرور">
                <button type="button" class="toggle-pwd" onclick="togglePassword('loginPassword')"><i class="fas fa-eye"></i></button>
            </div>
            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMeCheckbox"> تذكرني
                </label>
                <a href="#" class="forgot-link" id="forgotBtn">نسيت كلمة المرور؟</a>
            </div>
            <button class="action-btn" onclick="login()"><i class="fas fa-arrow-left"></i> دخول</button>
        </div>

        <div id="registerForm" class="form-container">
            <div id="registerMessage" class="message"></div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="regUsername" placeholder="اسم المستخدم (3 أحرف على الأقل)">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="regPassword" placeholder="كلمة المرور (4 أحرف على الأقل)">
                <button type="button" class="toggle-pwd" onclick="togglePassword('regPassword')"><i class="fas fa-eye"></i></button>
            </div>
            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" id="registerTerms"> أوافق على <a href="#" style="color:#2d7aff;">الشروط والأحكام</a>
                </label>
            </div>
            <button class="action-btn" onclick="register()"><i class="fas fa-user-plus"></i> إنشاء حساب</button>
        </div>

        <div class="footer">
            © 2026 MIKO HOST — استضافة احترافية بلا حدود
        </div>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">جاري المعالجة...</div>
</div>

<script>
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 60; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 6 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 15 + 8 + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.opacity = Math.random() * 0.4;
            container.appendChild(particle);
        }
    }
    createParticles();

    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const icon = field.nextElementSibling?.querySelector('i') || document.querySelector(`#${fieldId} + .toggle-pwd i`);
        if (field.type === 'password') {
            field.type = 'text';
            if (icon) icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            field.type = 'password';
            if (icon) icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function showMessage(element, msg, type) {
        const el = document.getElementById(element);
        el.innerHTML = msg;
        el.className = `message ${type}`;
        el.style.display = 'block';
        setTimeout(() => {
            el.style.display = 'none';
        }, 5000);
    }

    function showLoading(show) {
        const loader = document.getElementById('loadingOverlay');
        if (show) loader.classList.add('active');
        else loader.classList.remove('active');
    }

    document.getElementById('loginTabBtn').addEventListener('click', () => {
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('registerForm').classList.remove('active');
        document.getElementById('loginTabBtn').classList.add('active');
        document.getElementById('registerTabBtn').classList.remove('active');
    });
    document.getElementById('registerTabBtn').addEventListener('click', () => {
        document.getElementById('registerForm').classList.add('active');
        document.getElementById('loginForm').classList.remove('active');
        document.getElementById('registerTabBtn').classList.add('active');
        document.getElementById('loginTabBtn').classList.remove('active');
    });

    document.getElementById('forgotBtn').addEventListener('click', (e) => {
        e.preventDefault();
        window.open('https://t.me/a_u711', '_blank');
    });

    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const rememberMe = document.getElementById('rememberMeCheckbox').checked;
        if (!username || !password) {
            showMessage('loginMessage', '⚠️ الرجاء إدخال اسم المستخدم وكلمة المرور', 'error');
            return;
        }
        showLoading(true);
        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, remember_me: rememberMe })
            });
            const data = await response.json();
            if (data.success) {
                showMessage('loginMessage', '✅ تم تسجيل الدخول بنجاح، جاري التحويل...', 'success');
                setTimeout(() => {
                    window.location.href = data.redirect || (data.is_admin ? '/admin' : '/dashboard');
                }, 1000);
            } else {
                showMessage('loginMessage', '❌ ' + (data.message || 'بيانات غير صحيحة'), 'error');
            }
        } catch (err) {
            showMessage('loginMessage', '❌ خطأ في الاتصال بالخادم', 'error');
        } finally {
            showLoading(false);
        }
    }

    async function register() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const terms = document.getElementById('registerTerms').checked;
        if (!username || !password) {
            showMessage('registerMessage', '⚠️ الرجاء إدخال جميع البيانات', 'error');
            return;
        }
        if (username.length < 3) {
            showMessage('registerMessage', '⚠️ اسم المستخدم 3 أحرف على الأقل', 'error');
            return;
        }
        if (password.length < 4) {
            showMessage('registerMessage', '⚠️ كلمة المرور 4 أحرف على الأقل', 'error');
            return;
        }
        if (!terms) {
            showMessage('registerMessage', '⚠️ يجب الموافقة على الشروط والأحكام', 'error');
            return;
        }
        showLoading(true);
        try {
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            if (data.success) {
                showMessage('registerMessage', '✅ تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن', 'success');
                setTimeout(() => {
                    document.getElementById('loginTabBtn').click();
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('loginPassword').value = '';
                }, 2000);
            } else {
                showMessage('registerMessage', '❌ ' + (data.message || 'حدث خطأ'), 'error');
            }
        } catch (err) {
            showMessage('registerMessage', '❌ خطأ في الاتصال', 'error');
        } finally {
            showLoading(false);
        }
    }

    (async () => {
        try {
            const res = await fetch('/api/current_user');
            const data = await res.json();
            if (data.success && data.username) {
                window.location.href = data.is_admin ? '/admin' : '/dashboard';
            }
        } catch(e) {}
    })();
</script>
</body>
</html>
