<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول | MIKO HOST</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #05080f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(45, 122, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        /* الحاوية الرئيسية */
        .auth-container {
            width: 100%;
            max-width: 450px;
            background: rgba(12, 18, 28, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            border: 1px solid rgba(45, 122, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(45, 122, 255, 0.1);
            padding: 40px 32px;
            transition: all 0.3s ease;
        }

        /* الشعار */
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #0d1422, #070b14);
            border: 2px solid #00e5ff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 32px;
            color: #00e5ff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #2d7aff, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(45, 122, 255, 0.3);
        }

        .logo-sub {
            font-size: 11px;
            color: #7a8099;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        /* أزرار التبديل */
        .tabs {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px;
            border-radius: 60px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            color: #7a8099;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #2d7aff, #1a5cd8);
            color: white;
            box-shadow: 0 4px 15px rgba(45, 122, 255, 0.4);
        }

        /* النماذج */
        .form {
            display: none;
            animation: fade 0.3s ease;
        }

        .form.active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #4a5168;
            font-size: 18px;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 14px 48px 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(45, 122, 255, 0.2);
            border-radius: 50px;
            color: #fff;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #2d7aff;
            background: rgba(45, 122, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(45, 122, 255, 0.1);
        }

        .input-group input::placeholder {
            color: #4a5168;
        }

        /* زر إظهار كلمة المرور */
        .toggle-pwd {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #4a5168;
            cursor: pointer;
            font-size: 18px;
        }

        .toggle-pwd:hover {
            color: #2d7aff;
        }

        /* زر الإجراء */
        .action-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d7aff, #1a5cd8);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 800;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(45, 122, 255, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(45, 122, 255, 0.5);
        }

        /* رسائل الخطأ والنجاح */
        .message {
            padding: 12px 16px;
            border-radius: 50px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .message.error {
            background: rgba(255, 61, 90, 0.1);
            border: 1px solid rgba(255, 61, 90, 0.3);
            color: #ff6b8a;
        }

        .message.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        /* تذييل */
        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 11px;
            color: #4a5168;
        }

        .footer a {
            color: #2d7aff;
            text-decoration: none;
        }

        /* تحميل */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(45, 122, 255, 0.2);
            border-top-color: #2d7aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            margin-top: 15px;
            color: #2d7aff;
            font-size: 14px;
        }

        /* توافق الجوال */
        @media (max-width: 500px) {
            .auth-container {
                padding: 30px 20px;
            }
            .logo-text {
                font-size: 20px;
            }
            .tab-btn {
                padding: 10px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="circle" style="width: 300px; height: 300px; top: -100px; right: -100px; animation-duration: 25s;"></div>
        <div class="circle" style="width: 200px; height: 200px; bottom: -50px; left: -50px; animation-duration: 20s;"></div>
        <div class="circle" style="width: 150px; height: 150px; top: 40%; left: 20%; animation-duration: 30s;"></div>
    </div>

    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-server"></i></div>
            <div class="logo-text">MIKO HOST</div>
            <div class="logo-sub">BY @I_tt_6</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="loginTabBtn">تسجيل الدخول</button>
            <button class="tab-btn" id="registerTabBtn">إنشاء حساب</button>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <div id="loginForm" class="form active">
            <div id="loginMessage" class="message"></div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="loginUsername" placeholder="اسم المستخدم" autocomplete="username">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="كلمة المرور">
                <button type="button" class="toggle-pwd" onclick="togglePassword('loginPassword')"><i class="fas fa-eye"></i></button>
            </div>
            <button class="action-btn" onclick="login()">دخول</button>
        </div>

        <!-- نموذج إنشاء حساب -->
        <div id="registerForm" class="form">
            <div id="registerMessage" class="message"></div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="regUsername" placeholder="اسم المستخدم (3 أحرف على الأقل)">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="regPassword" placeholder="كلمة المرور (4 أحرف على الأقل)">
                <button type="button" class="toggle-pwd" onclick="togglePassword('regPassword')"><i class="fas fa-eye"></i></button>
            </div>
            <button class="action-btn" onclick="register()">إنشاء حساب</button>
        </div>

        <div class="footer">
            © 2026 MIKO HOST — منصة استضافة احترافية
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>جاري المعالجة...</p>
    </div>

    <script>
        // تبديل النماذج
        document.getElementById('loginTabBtn').addEventListener('click', () => {
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
            document.getElementById('loginTabBtn').classList.add('active');
            document.getElementById('registerTabBtn').classList.remove('active');
            clearMessages();
        });

        document.getElementById('registerTabBtn').addEventListener('click', () => {
            document.getElementById('registerForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerTabBtn').classList.add('active');
            document.getElementById('loginTabBtn').classList.remove('active');
            clearMessages();
        });

        function clearMessages() {
            document.getElementById('loginMessage').style.display = 'none';
            document.getElementById('registerMessage').style.display = 'none';
        }

        function showMessage(element, msg, type) {
            const el = document.getElementById(element);
            el.innerHTML = msg;
            el.className = `message ${type}`;
            el.style.display = 'block';
            setTimeout(() => {
                el.style.display = 'none';
            }, 5000);
        }

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const type = field.type === 'password' ? 'text' : 'password';
            field.type = type;
        }

        function showLoading(show) {
            const loader = document.getElementById('loading');
            if (show) loader.classList.add('active');
            else loader.classList.remove('active');
        }

        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showMessage('loginMessage', '⚠️ الرجاء إدخال اسم المستخدم وكلمة المرور', 'error');
                return;
            }

            showLoading(true);
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, remember_me: false })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('loginMessage', '✅ تم تسجيل الدخول بنجاح، جاري التحويل...', 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect || (data.is_admin ? '/admin' : '/dashboard');
                    }, 1000);
                } else {
                    showMessage('loginMessage', '❌ ' + (data.message || 'بيانات غير صحيحة'), 'error');
                }
            } catch (err) {
                showMessage('loginMessage', '❌ خطأ في الاتصال بالخادم', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !password) {
                showMessage('registerMessage', '⚠️ الرجاء إدخال جميع البيانات', 'error');
                return;
            }
            if (username.length < 3) {
                showMessage('registerMessage', '⚠️ اسم المستخدم يجب أن يكون 3 أحرف على الأقل', 'error');
                return;
            }
            if (password.length < 4) {
                showMessage('registerMessage', '⚠️ كلمة المرور يجب أن تكون 4 أحرف على الأقل', 'error');
                return;
            }

            showLoading(true);
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('registerMessage', '✅ تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن', 'success');
                    // تبديل إلى نموذج الدخول تلقائياً بعد 2 ثانية
                    setTimeout(() => {
                        document.getElementById('loginTabBtn').click();
                        document.getElementById('loginUsername').value = username;
                        document.getElementById('loginPassword').value = '';
                    }, 2000);
                } else {
                    showMessage('registerMessage', '❌ ' + (data.message || 'حدث خطأ'), 'error');
                }
            } catch (err) {
                showMessage('registerMessage', '❌ خطأ في الاتصال بالخادم', 'error');
            } finally {
                showLoading(false);
            }
        }

        // إذا كان المستخدم مسجل دخوله بالفعل، نعيد توجيهه
        (async () => {
            try {
                const res = await fetch('/api/current_user');
                const data = await res.json();
                if (data.success && data.username) {
                    window.location.href = data.is_admin ? '/admin' : '/dashboard';
                }
            } catch(e) {}
        })();
    </script>
</body>
</html>
