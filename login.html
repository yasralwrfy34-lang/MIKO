<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول | MIKO HOST</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0f1c 0%, #05080f 100%);
            position: relative;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(45, 122, 255, 0.08);
            animation: float 25s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-40px) rotate(5deg); }
        }

        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 1100px;
            background: rgba(12, 18, 28, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            border: 1px solid rgba(45, 122, 255, 0.3);
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            margin: 20px;
        }

        .welcome-section {
            flex: 1;
            background: linear-gradient(145deg, rgba(45, 122, 255, 0.1), rgba(0, 229, 255, 0.05));
            padding: 48px 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-left: 1px solid rgba(45, 122, 255, 0.2);
        }

        .welcome-image {
            margin-bottom: 32px;
        }

        .welcome-image img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #2d7aff;
            box-shadow: 0 0 20px rgba(45, 122, 255, 0.3);
            transition: transform 0.3s;
        }

        .welcome-image img:hover {
            transform: scale(1.05);
        }

        .welcome-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2d7aff, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }

        .welcome-text {
            color: #7a8099;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .form-section {
            flex: 1;
            padding: 48px 40px;
        }

        /* تم حذف اللوجو القديم بناءً على طلب المستخدم */

        .tabs {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px;
            border-radius: 60px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            color: #7a8099;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #2d7aff, #1a5cd8);
            color: white;
            box-shadow: 0 4px 15px rgba(45, 122, 255, 0.4);
        }

        .form {
            display: none;
            animation: fade 0.3s ease;
        }

        .form.active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #4a5168;
            font-size: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 48px 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(45, 122, 255, 0.2);
            border-radius: 50px;
            color: #fff;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #2d7aff;
            background: rgba(45, 122, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(45, 122, 255, 0.1);
        }

        .toggle-pwd {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #4a5168;
            cursor: pointer;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d7aff, #1a5cd8);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 800;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(45, 122, 255, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(45, 122, 255, 0.5);
        }

        .message {
            padding: 12px 16px;
            border-radius: 50px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .message.error {
            background: rgba(255, 61, 90, 0.1);
            border: 1px solid rgba(255, 61, 90, 0.3);
            color: #ff6b8a;
        }

        .message.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 11px;
            color: #4a5168;
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(45, 122, 255, 0.2);
            border-top-color: #2d7aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
                margin: 16px;
            }
            .welcome-section {
                padding: 32px 20px;
                border-left: none;
                border-bottom: 1px solid rgba(45, 122, 255, 0.2);
            }
            .welcome-image img {
                width: 120px;
                height: 120px;
            }
            .welcome-title {
                font-size: 1.4rem;
            }
            .form-section {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="circle" style="width: 300px; height: 300px; top: -100px; right: -100px; animation-duration: 25s;"></div>
        <div class="circle" style="width: 200px; height: 200px; bottom: -50px; left: -50px; animation-duration: 20s;"></div>
        <div class="circle" style="width: 150px; height: 150px; top: 40%; left: 20%; animation-duration: 30s;"></div>
    </div>

    <div class="login-wrapper">
        <div class="welcome-section">
            <div class="welcome-image">
                <img src="https://i.postimg.cc/15gHrQDK/1776031185250.png" alt="ترحيب MIKO HOST">
            </div>
            <div class="welcome-title">مرحباً بك في MIKO HOST</div>
            <div class="welcome-text">
                منصة استضافة متكاملة كاملة ومتطورة لإدارة سيرفراتك وبوتاتك بكل سهولة وأمان واحترافية.
            </div>
        </div>

        <div class="form-section">
            <div class="tabs">
                <button class="tab-btn active" id="loginTabBtn">تسجيل الدخول</button>
                <button class="tab-btn" id="registerTabBtn">إنشاء حساب</button>
            </div>

            <!-- نموذج تسجيل الدخول (بدون أي تحقق إضافي) -->
            <div id="loginForm" class="form active">
                <div id="loginMessage" class="message"></div>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginUsername" placeholder="اسم المستخدم" autocomplete="username">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="كلمة المرور">
                    <button type="button" class="toggle-pwd" onclick="togglePassword('loginPassword')"><i class="fas fa-eye"></i></button>
                </div>
                <button class="action-btn" onclick="login()">دخول</button>
            </div>

            <!-- نموذج إنشاء حساب (بدون أي تحقق إضافي) -->
            <div id="registerForm" class="form">
                <div id="registerMessage" class="message"></div>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="regUsername" placeholder="اسم المستخدم (3 أحرف على الأقل)">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="regPassword" placeholder="كلمة المرور (4 أحرف على الأقل)">
                    <button type="button" class="toggle-pwd" onclick="togglePassword('regPassword')"><i class="fas fa-eye"></i></button>
                </div>
                <button class="action-btn" onclick="register()">إنشاء حساب</button>
            </div>

            <div class="footer">
                © 2026 MIKO HOST — منصة استضافة متكاملة
            </div>
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>جاري المعالجة...</p>
    </div>

    <script>
        // دوال عامة
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === 'password' ? 'text' : 'password';
        }

        function showMessage(element, msg, type) {
            const el = document.getElementById(element);
            el.innerHTML = msg;
            el.className = `message ${type}`;
            el.style.display = 'block';
            setTimeout(() => {
                el.style.display = 'none';
            }, 5000);
        }

        function showLoading(show) {
            const loader = document.getElementById('loading');
            if (show) loader.classList.add('active');
            else loader.classList.remove('active');
        }

        // تبديل التبويبات
        document.getElementById('loginTabBtn').addEventListener('click', () => {
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
            document.getElementById('loginTabBtn').classList.add('active');
            document.getElementById('registerTabBtn').classList.remove('active');
        });

        document.getElementById('registerTabBtn').addEventListener('click', () => {
            document.getElementById('registerForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerTabBtn').classList.add('active');
            document.getElementById('loginTabBtn').classList.remove('active');
        });

        // تسجيل الدخول
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showMessage('loginMessage', '⚠️ الرجاء إدخال اسم المستخدم وكلمة المرور', 'error');
                return;
            }

            showLoading(true);
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, remember_me: false })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('loginMessage', '✅ تم تسجيل الدخول بنجاح، جاري التحويل...', 'success');
                    setTimeout(() => {
                        window.location.href = data.redirect || (data.is_admin ? '/admin' : '/dashboard');
                    }, 1000);
                } else {
                    showMessage('loginMessage', '❌ ' + (data.message || 'بيانات غير صحيحة'), 'error');
                }
            } catch (err) {
                showMessage('loginMessage', '❌ خطأ في الاتصال بالخادم', 'error');
            } finally {
                showLoading(false);
            }
        }

        // إنشاء حساب
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !password) {
                showMessage('registerMessage', '⚠️ الرجاء إدخال جميع البيانات', 'error');
                return;
            }
            if (username.length < 3) {
                showMessage('registerMessage', '⚠️ اسم المستخدم يجب أن يكون 3 أحرف على الأقل', 'error');
                return;
            }
            if (password.length < 4) {
                showMessage('registerMessage', '⚠️ كلمة المرور يجب أن تكون 4 أحرف على الأقل', 'error');
                return;
            }

            showLoading(true);
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    showMessage('registerMessage', '✅ تم إنشاء الحساب بنجاح! يمكنك تسجيل الدخول الآن', 'success');
                    setTimeout(() => {
                        document.getElementById('loginTabBtn').click();
                        document.getElementById('loginUsername').value = username;
                        document.getElementById('loginPassword').value = '';
                    }, 2000);
                } else {
                    showMessage('registerMessage', '❌ ' + (data.message || 'حدث خطأ'), 'error');
                }
            } catch (err) {
                showMessage('registerMessage', '❌ خطأ في الاتصال بالخادم', 'error');
            } finally {
                showLoading(false);
            }
        }

        // التحقق من وجود جلسة مفتوحة
        (async () => {
            try {
                const res = await fetch('/api/current_user');
                const data = await res.json();
                if (data.success && data.username) {
                    window.location.href = data.is_admin ? '/admin' : '/dashboard';
                }
            } catch(e) {}
        })();
    </script>
</body>
</html>
