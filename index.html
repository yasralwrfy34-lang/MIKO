<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>MIKO HOST - لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Tajawal', sans-serif;
            background: #0a0c10;
            color: #eef2ff;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        .bg-aurora {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 30% 40%, rgba(56, 139, 253, 0.12), transparent 70%),
                        radial-gradient(ellipse at 80% 70%, rgba(0, 210, 255, 0.08), transparent 60%);
            z-index: -2;
        }

        .bg-noise {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            z-index: -1;
            pointer-events: none;
        }

        /* شريط التنقل العلوي */
        .navbar {
            background: rgba(8, 12, 28, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(45, 122, 255, 0.3);
            padding: 12px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(145deg, #0f172a, #0a0f1c);
            border: 1px solid #00e5ff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #00e5ff;
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.3);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #2d7aff, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .user-greeting {
            font-size: 0.8rem;
            color: #9ca3cf;
        }

        .user-greeting strong {
            color: #00e5ff;
        }

        .logout-btn {
            background: rgba(255, 70, 85, 0.15);
            border: 1px solid rgba(255, 70, 85, 0.4);
            color: #ff5e7c;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background: rgba(255, 70, 85, 0.25);
            transform: translateY(-1px);
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* بطاقات الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(45, 122, 255, 0.2);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            border-color: rgba(45, 122, 255, 0.5);
            transform: translateY(-3px);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .stat-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #9ca3cf;
        }

        .stat-icon {
            width: 42px;
            height: 42px;
            background: rgba(45, 122, 255, 0.15);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #2d7aff;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 8px;
        }

        .stat-progress {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 8px;
        }

        .stat-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #2d7aff, #00e5ff);
            width: 0%;
        }

        /* قسم السيرفرات */
        .servers-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .servers-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .servers-title i {
            color: #2d7aff;
        }

        .create-server-btn {
            background: linear-gradient(135deg, #2d7aff, #1a5cd8);
            border: none;
            border-radius: 50px;
            padding: 10px 24px;
            font-weight: 700;
            font-size: 0.8rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 14px rgba(45, 122, 255, 0.4);
        }

        .create-server-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(45, 122, 255, 0.6);
        }

        /* بطاقات السيرفرات */
        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .server-card {
            background: rgba(12, 18, 34, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(45, 122, 255, 0.2);
            border-radius: 28px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .server-card:hover {
            border-color: rgba(45, 122, 255, 0.5);
            transform: translateY(-4px);
        }

        .server-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .server-icon {
            width: 50px;
            height: 50px;
            background: rgba(45, 122, 255, 0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #2d7aff;
        }

        .server-status-badge {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-online {
            color: #00ff88;
        }
        .status-offline {
            color: #9ca3cf;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .dot-online { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
        .dot-offline { background: #9ca3cf; }

        .server-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .server-meta {
            display: flex;
            gap: 16px;
            font-size: 0.7rem;
            color: #9ca3cf;
            margin-bottom: 16px;
        }

        .server-port {
            background: rgba(45, 122, 255, 0.15);
            border-radius: 30px;
            padding: 4px 12px;
        }

        .server-plan-badge {
            background: rgba(0, 229, 255, 0.15);
            border-radius: 30px;
            padding: 4px 12px;
            color: #00e5ff;
        }

        /* صفحة تفاصيل السيرفر */
        .server-detail {
            display: none;
            animation: fadeSlide 0.3s ease;
        }

        .server-detail.active {
            display: block;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .back-btn {
            background: rgba(45, 122, 255, 0.15);
            border: 1px solid rgba(45, 122, 255, 0.3);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: #2d7aff;
        }

        .back-btn:hover {
            background: rgba(45, 122, 255, 0.25);
        }

        .server-title {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2d7aff, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* أزرار التحكم العلوية */
        .action-strip {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            background: rgba(8, 12, 28, 0.5);
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 28px;
            border: 1px solid rgba(45, 122, 255, 0.2);
            justify-content: center;
        }

        .glow-btn {
            background: linear-gradient(135deg, rgba(45, 122, 255, 0.2), rgba(0, 229, 255, 0.1));
            border: 1px solid rgba(45, 122, 255, 0.5);
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .glow-btn.start { color: #00ff88; border-color: #00ff88; }
        .glow-btn.stop { color: #ff5e7c; border-color: #ff5e7c; }
        .glow-btn.restart { color: #ffcf4a; border-color: #ffcf4a; }
        .glow-btn.delete { color: #ff8a5c; border-color: #ff8a5c; }

        .glow-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* التبويبات */
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(45, 122, 255, 0.2);
            padding-bottom: 8px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 20px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: #9ca3cf;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .tab-btn.active {
            color: #2d7aff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -9px;
            right: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #2d7aff, #00e5ff);
            border-radius: 2px;
        }

        /* الكونسول */
        .console-box {
            background: #010409;
            border: 1px solid rgba(45, 122, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            color: #b0f0b0;
            white-space: pre-wrap;
        }

        /* الملفات */
        .files-table {
            width: 100%;
            border-collapse: collapse;
        }
        .files-table th, .files-table td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(45, 122, 255, 0.1);
            text-align: right;
        }
        .upload-zone {
            border: 1px dashed rgba(45, 122, 255, 0.5);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            background: rgba(45, 122, 255, 0.02);
        }
        .file-btn {
            background: rgba(45, 122, 255, 0.2);
            border: none;
            border-radius: 30px;
            padding: 4px 12px;
            margin: 0 4px;
            cursor: pointer;
            color: white;
        }

        /* مودال إنشاء السيرفر */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: linear-gradient(145deg, #0f172f, #050a18);
            border: 1px solid #2d7aff;
            border-radius: 32px;
            width: 90%;
            max-width: 500px;
            padding: 28px;
            text-align: center;
        }
        .plan-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(45,122,255,0.3);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .plan-card:hover, .plan-card.selected {
            border-color: #2d7aff;
            background: rgba(45,122,255,0.1);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(45,122,255,0.3);
            border-top-color: #2d7aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            border: 1px solid #2d7aff;
            border-radius: 60px;
            padding: 10px 24px;
            z-index: 1100;
            display: none;
            font-size: 0.8rem;
        }
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .action-strip {
                flex-wrap: wrap;
            }
            .container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<div class="bg-aurora"></div>
<div class="bg-noise"></div>

<div class="navbar">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-crown"></i></div>
        <span class="logo-text">MIKO HOST</span>
    </div>
    <div class="user-section">
        <div class="user-greeting"><i class="far fa-user-circle"></i> مرحباً، <strong id="username">...</strong></div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
</div>

<div class="container">
    <!-- الصفحة الرئيسية (قائمة السيرفرات) -->
    <div id="homeView">
        <!-- بطاقات الإحصائيات -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <span class="stat-title">السيرفرات المستخدمة</span>
                    <div class="stat-icon"><i class="fas fa-server"></i></div>
                </div>
                <div class="stat-value" id="usedServers">0/1</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <span class="stat-title">الصلاحية المتبقية</span>
                    <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
                </div>
                <div class="stat-value" id="expiryDays">-- يوم</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <span class="stat-title">المساحة المستخدمة</span>
                    <div class="stat-icon"><i class="fas fa-hdd"></i></div>
                </div>
                <div class="stat-value" id="diskUsed">0 MB</div>
                <div class="stat-progress"><div class="stat-progress-bar" id="diskProgress"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <span class="stat-title">استخدام الرام</span>
                    <div class="stat-icon"><i class="fas fa-microchip"></i></div>
                </div>
                <div class="stat-value" id="ramUsage">0%</div>
                <div class="stat-progress"><div class="stat-progress-bar" id="ramProgress"></div></div>
            </div>
        </div>

        <div class="servers-header">
            <div class="servers-title"><i class="fas fa-cubes"></i> الخوادم النشطة</div>
            <button class="create-server-btn" id="openCreateModalBtn"><i class="fas fa-plus-circle"></i> خادم جديد</button>
        </div>

        <div class="servers-grid" id="serversGrid">
            <div style="text-align:center; padding:60px; color:#9ca3cf;">جاري التحميل...</div>
        </div>
    </div>

    <!-- صفحة تفاصيل السيرفر (تظهر بعد الضغط على أي سيرفر) -->
    <div id="detailView" class="server-detail">
        <div class="detail-header">
            <button class="back-btn" onclick="goHome()"><i class="fas fa-arrow-right"></i> العودة</button>
            <div class="server-title" id="detailTitle"></div>
        </div>

        <div class="action-strip" id="actionStrip">
            <button class="glow-btn start" onclick="serverAction('start')"><i class="fas fa-play"></i> تشغيل</button>
            <button class="glow-btn restart" onclick="serverAction('restart')"><i class="fas fa-sync-alt"></i> إعادة تشغيل</button>
            <button class="glow-btn stop" onclick="serverAction('stop')"><i class="fas fa-stop"></i> إيقاف</button>
            <button class="glow-btn delete" onclick="confirmDelete()"><i class="fas fa-trash"></i> حذف</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="console">الكونسول</button>
            <button class="tab-btn" data-tab="files">الملفات</button>
        </div>

        <div id="tabConsole" class="tab-content active">
            <div class="console-box" id="consoleOut"></div>
        </div>

        <div id="tabFiles" class="tab-content" style="display:none;">
            <div class="upload-zone" onclick="document.getElementById('fileUpload').click()" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
                <i class="fas fa-cloud-upload-alt"></i> اسحب الملفات أو انقر للرفع
            </div>
            <input type="file" id="fileUpload" multiple style="display:none" onchange="uploadFiles(this.files)">
            <div style="margin-bottom: 16px;">
                <button class="glow-btn" onclick="showCreateFileModal()" style="background:#2d7aff;"><i class="fas fa-file"></i> ملف جديد</button>
                <button class="glow-btn" onclick="installPackages()" style="background:#2d7aff;"><i class="fas fa-cube"></i> تثبيت المكتبات</button>
            </div>
            <table class="files-table">
                <thead><tr><th></th><th>الاسم</th><th>الحجم</th><th></th></tr></thead>
                <tbody id="filesList"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- مودال اختيار الخطة (إنشاء سيرفر) -->
<div id="plansModal" class="modal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="color:#2d7aff;">اختر خطتك</h3>
            <button onclick="closePlansModal()" style="background:none; border:none; color:#9ca3cf; font-size:1.2rem;">✕</button>
        </div>
        <div id="plansList"></div>
        <div id="paymentMethods" style="display:none; margin-top: 20px;">
            <div style="display: flex; gap: 10px;">
                <button class="glow-btn" onclick="contactSupport('card')">بطاقة ائتمان</button>
                <button class="glow-btn" onclick="contactSupport('bank')">تحويل بنكي</button>
                <button class="glow-btn" onclick="contactSupport('crypto')">كريبتو</button>
            </div>
        </div>
    </div>
</div>

<!-- مودال التحميل ونجاح الإنشاء -->
<div id="createProgressModal" class="modal">
    <div class="modal-content">
        <div id="createLoading"><div class="spinner"></div><p>جاري إنشاء الخادم...</p></div>
        <div id="createSuccess" style="display:none;">
            <i class="fas fa-check-circle" style="font-size:3rem; color:#00ff88;"></i>
            <p style="margin:16px 0;">تم إنشاء الخادم بنجاح!</p>
            <div id="newServerDetails" style="background:#0a0c18; border-radius:20px; padding:12px; margin:12px 0; text-align:right;">
                <p><strong>الاسم:</strong> <span id="newServerName"></span></p>
                <p><strong>المنفذ:</strong> <span id="newServerPort"></span></p>
                <p><strong>الخطة:</strong> <span id="newServerPlan"></span></p>
            </div>
            <button class="glow-btn start" id="goToServerBtn">الانتقال إلى الخادم</button>
        </div>
    </div>
</div>

<!-- مودالات أخرى -->
<div id="editorModal" class="modal"><div class="modal-content"><textarea id="editorArea" rows="12" style="width:100%; background:#010409; border:1px solid #2d7aff; border-radius:16px; padding:12px; color:white;"></textarea><button class="glow-btn" style="width:100%; margin-top:16px;" onclick="saveFile()">حفظ</button></div></div>
<div id="confirmModal" class="modal"><div class="modal-content"><p id="confirmMsg"></p><div style="display:flex; gap:12px; margin-top:20px;"><button class="glow-btn" id="confirmYesBtn" style="background:#ff3d5a;">تأكيد</button><button class="glow-btn" onclick="closeConfirm()">إلغاء</button></div></div></div>
<div id="createFileModal" class="modal"><div class="modal-content"><input type="text" id="newFileName" placeholder="script.py" style="width:100%; margin-bottom:12px; padding:10px; border-radius:40px; border:1px solid #2d7aff; background:#010409; color:white;"><textarea id="newFileContent" rows="4" placeholder="المحتوى" style="width:100%; border-radius:16px; border:1px solid #2d7aff; background:#010409; color:white; padding:12px;"></textarea><button class="glow-btn" style="width:100%; margin-top:16px;" onclick="createFile()">إنشاء</button></div></div>

<div id="toast" class="toast"></div>

<script>
    let currentServer = null, polling = null, currentFile = null, confirmAction = null, selectedPlan = null;
    let createdServerData = null;

    const showToast = (msg, type='info') => {
        const t = document.getElementById('toast');
        t.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-info-circle'}"></i> ${msg}`;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    };
    const showConfirm = (msg, cb) => {
        document.getElementById('confirmMsg').innerText = msg;
        confirmAction = cb;
        document.getElementById('confirmModal').classList.add('active');
    };
    const closeConfirm = () => document.getElementById('confirmModal').classList.remove('active');
    document.getElementById('confirmYesBtn').onclick = () => { if(confirmAction) confirmAction(); closeConfirm(); };

    // الخطط
    const plans = [
        { id:'free', name:'🎁 مجاني', storage:100, ram:256, price:0 },
        { id:'4gb', name:'💎 4 جيجا', storage:4096, ram:1024, price:5 },
        { id:'10gb', name:'💎 10 جيجا', storage:10240, ram:2048, price:10 },
        { id:'40gb', name:'💎 40 جيجا', storage:40960, ram:4096, price:25 }
    ];

    function showPlansModal() {
        const container = document.getElementById('plansList');
        container.innerHTML = plans.map(p => `<div class="plan-card" data-plan='${JSON.stringify(p)}'><div style="font-weight:700;">${p.name}</div><div>${p.storage}MB / ${p.ram}MB</div><div style="color:#2d7aff;">${p.price===0?'مجاني':p.price+'$'}</div></div>`).join('');
        document.querySelectorAll('.plan-card').forEach(card => {
            card.onclick = () => {
                document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedPlan = JSON.parse(card.dataset.plan);
                if(selectedPlan.price === 0) createServerWithPlan(selectedPlan);
                else document.getElementById('paymentMethods').style.display = 'block';
            };
        });
        document.getElementById('paymentMethods').style.display = 'none';
        document.getElementById('plansModal').classList.add('active');
    }
    function closePlansModal() { document.getElementById('plansModal').classList.remove('active'); selectedPlan=null; }
    function contactSupport(method) { window.open(`https://t.me/a_u711?text=شراء خطة ${selectedPlan.name} بـ ${selectedPlan.price}$ عبر ${method}`, '_blank'); closePlansModal(); }

    async function createServerWithPlan(plan) {
        closePlansModal();
        const modal = document.getElementById('createProgressModal');
        document.getElementById('createLoading').style.display = 'block';
        document.getElementById('createSuccess').style.display = 'none';
        modal.classList.add('active');
        try {
            const res = await fetch('/api/server/add', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: 'خادمي', plan: plan.id, storage: plan.storage, ram: plan.ram, cpu: 0.5 })
            });
            const data = await res.json();
            if(data.success) {
                // جلب تفاصيل السيرفر الجديد
                const serversRes = await fetch('/api/servers');
                const serversData = await serversRes.json();
                const newServer = serversData.servers[serversData.servers.length-1];
                createdServerData = newServer;
                document.getElementById('newServerName').innerText = newServer.title;
                document.getElementById('newServerPort').innerText = newServer.port;
                document.getElementById('newServerPlan').innerText = plan.name;
                document.getElementById('createLoading').style.display = 'none';
                document.getElementById('createSuccess').style.display = 'block';
                document.getElementById('goToServerBtn').onclick = () => {
                    modal.classList.remove('active');
                    openServer(newServer);
                };
            } else {
                modal.classList.remove('active');
                showToast(data.message || 'فشل الإنشاء', 'error');
            }
        } catch(e) {
            modal.classList.remove('active');
            showToast('خطأ في الاتصال', 'error');
        }
    }

    // المصادقة وجلب البيانات
    async function checkAuth() {
        try { const r = await fetch('/api/current_user'); const d = await r.json(); if(!d.success) window.location.href='/login'; else { document.getElementById('username').innerText = d.username; loadServers(); fetchMetrics(); setInterval(fetchMetrics, 8000); } } catch(e) { window.location.href='/login'; }
    }
    async function fetchMetrics() {
        try { const r = await fetch('/api/system/metrics'); const d = await r.json(); document.getElementById('ramUsage').innerText = d.memory+'%'; document.getElementById('ramProgress').style.width = d.memory+'%'; } catch(e) {}
    }
    async function loadServers() {
        try {
            const r = await fetch('/api/servers'); const d = await r.json();
            document.getElementById('usedServers').innerText = `${d.stats.used}/1`;
            document.getElementById('expiryDays').innerText = d.stats.expiry;
            const diskTotal = d.stats.disk_total||100, diskUsed = d.stats.disk_used||0;
            document.getElementById('diskUsed').innerText = `${Math.round(diskUsed)}/${diskTotal} MB`;
            document.getElementById('diskProgress').style.width = (diskUsed/diskTotal)*100+'%';
            const grid = document.getElementById('serversGrid');
            if(d.servers.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:60px; color:#9ca3cf;">لا توجد خوادم، أنشئ واحداً</div>';
                return;
            }
            grid.innerHTML = '';
            d.servers.forEach(s => {
                const card = document.createElement('div');
                card.className = 'server-card';
                card.innerHTML = `
                    <div class="server-card-header">
                        <div class="server-icon"><i class="fas fa-cube"></i></div>
                        <div class="server-status-badge ${s.status==='Running'?'status-online':'status-offline'}"><span class="status-dot ${s.status==='Running'?'dot-online':'dot-offline'}"></span>${s.status==='Running'?'يعمل':'متوقف'}</div>
                    </div>
                    <div class="server-name">${escapeHtml(s.title)}</div>
                    <div class="server-meta">
                        <span class="server-port"><i class="fas fa-plug"></i> ${s.port||'N/A'}</span>
                        <span class="server-plan-badge"><i class="fas fa-tag"></i> ${s.plan==='free'?'مجاني':s.plan}</span>
                    </div>
                `;
                card.onclick = () => openServer(s);
                grid.appendChild(card);
            });
        } catch(e) { showToast('خطأ في التحميل', 'error'); }
    }

    function openServer(s) {
        currentServer = s;
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('detailView').classList.add('active');
        document.getElementById('detailTitle').innerHTML = `<i class="fas fa-server"></i> ${escapeHtml(s.title)}`;
        if(polling) clearInterval(polling);
        fetchStats();
        polling = setInterval(fetchStats, 4000);
        switchTab('console');
        loadFiles();
        loadStartupFiles();
    }

    async function fetchStats() {
        if(!currentServer) return;
        try {
            const r = await fetch(`/api/server/stats/${currentServer.folder}`);
            const d = await r.json();
            if(!d.success) return;
            document.getElementById('consoleOut').innerHTML = (d.logs || 'لا توجد مخرجات').split('\n').map(l => `<div>${escapeHtml(l)}</div>`).join('');
            document.getElementById('consoleOut').scrollTop = document.getElementById('consoleOut').scrollHeight;
        } catch(e) {}
    }

    async function serverAction(act) {
        if(act === 'delete') { confirmDelete(); return; }
        showToast(`جاري ${act}...`);
        try {
            const r = await fetch(`/api/server/action/${currentServer.folder}/${act}`, { method:'POST' });
            const d = await r.json();
            if(d.success) {
                showToast(d.message, 'success');
                if(act !== 'stop') setTimeout(fetchStats, 1000);
                loadServers();
            } else showToast(d.message || 'فشل', 'error');
        } catch(e) { showToast('خطأ', 'error'); }
    }

    function confirmDelete() {
        showConfirm('⚠️ حذف الخادم نهائياً؟ لا يمكن التراجع', async () => {
            const r = await fetch(`/api/server/action/${currentServer.folder}/delete`, { method:'POST' });
            const d = await r.json();
            if(d.success) {
                showToast('تم الحذف', 'success');
                if(polling) clearInterval(polling);
                goHome();
            } else showToast(d.message || 'فشل', 'error');
        });
    }

    function goHome() {
        document.getElementById('homeView').style.display = 'block';
        document.getElementById('detailView').classList.remove('active');
        if(polling) clearInterval(polling);
        currentServer = null;
        loadServers();
    }

    // التبويبات
    function switchTab(tab) {
        const consoleTab = document.getElementById('tabConsole');
        const filesTab = document.getElementById('tabFiles');
        const btns = document.querySelectorAll('.tab-btn');
        if(tab === 'console') {
            consoleTab.style.display = 'block';
            filesTab.style.display = 'none';
            btns[0].classList.add('active');
            btns[1].classList.remove('active');
        } else {
            consoleTab.style.display = 'none';
            filesTab.style.display = 'block';
            btns[0].classList.remove('active');
            btns[1].classList.add('active');
            loadFiles();
        }
    }
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => switchTab(btn.dataset.tab);
    });

    // إدارة الملفات
    async function loadFiles() {
        if(!currentServer) return;
        const tbody = document.getElementById('filesList');
        tbody.innerHTML = '<tr><td colspan="4">جاري...<\/td><\/tr>';
        try {
            const r = await fetch(`/api/files/list/${currentServer.folder}`);
            const files = await r.json();
            if(files.length === 0) { tbody.innerHTML = '<td><td colspan="4">لا توجد ملفات<\/td><\/tr>'; return; }
            tbody.innerHTML = files.map(f => `
                <tr>
                    <td><input type="checkbox" class="file-checkbox" value="${escapeHtml(f.name)}"></td>
                    <td><i class="fas ${f.is_dir ? 'fa-folder' : 'fa-file'}"></i> ${escapeHtml(f.name)}</div></td>
                    <td>${f.size}</td>
                    <td class="file-actions">
                        ${!f.is_dir ? `<button class="file-btn edit" onclick="editFile('${escapeHtml(f.name)}')">تعديل</button>` : ''}
                        ${f.name.toLowerCase().endsWith('.zip') ? `<button class="file-btn" onclick="unzipFile('${escapeHtml(f.name)}')">فك الضغط</button>` : ''}
                        <button class="file-btn delete" onclick="deleteFile('${escapeHtml(f.name)}')">حذف</button>
                    </td>
                </tr>
            `).join('');
        } catch(e) { tbody.innerHTML = '<tr><td colspan="4">خطأ<\/td><\/tr>'; }
    }
    async function editFile(name) { currentFile = name; const r = await fetch(`/api/files/content/${currentServer.folder}/${name}`); const d = await r.json(); document.getElementById('editorArea').value = d.content||''; document.getElementById('editorModal').classList.add('active'); }
    async function saveFile() { if(!currentFile) return; const content = document.getElementById('editorArea').value; await fetch(`/api/files/save/${currentServer.folder}/${currentFile}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({content}) }); showToast('تم الحفظ', 'success'); document.getElementById('editorModal').classList.remove('active'); currentFile=null; loadFiles(); }
    async function deleteFile(name) { showConfirm(`حذف ${name}؟`, async () => { await fetch(`/api/files/delete/${currentServer.folder}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({names:[name]}) }); loadFiles(); }); }
    async function uploadFiles(files) { if(!files.length) return; const fd = new FormData(); for(let f of files) fd.append('files[]',f); await fetch(`/api/files/upload/${currentServer.folder}`, { method:'POST', body:fd }); loadFiles(); showToast('تم رفع الملفات', 'success'); }
    function handleDrop(e) { e.preventDefault(); uploadFiles(e.dataTransfer.files); }
    async function installPackages() { showToast('بدء التثبيت...'); const r = await fetch(`/api/server/install/${currentServer.folder}`, { method:'POST' }); const d = await r.json(); showToast(d.message, d.success?'success':'error'); }
    function showCreateFileModal() { document.getElementById('newFileName').value=''; document.getElementById('newFileContent').value=''; document.getElementById('createFileModal').classList.add('active'); }
    function closeCreateFileModal() { document.getElementById('createFileModal').classList.remove('active'); }
    async function unzipFile(name) { showToast('جاري فك الضغط...'); await fetch(`/api/files/unzip/${currentServer.folder}/${name}`, { method:'POST' }); loadFiles(); }
    async function createFile() { const name = document.getElementById('newFileName').value.trim(); const content = document.getElementById('newFileContent').value; if(!name) return; await fetch(`/api/files/create/${currentServer.folder}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({filename:name,content}) }); closeCreateFileModal(); loadFiles(); loadStartupFiles(); }
    async function loadStartupFiles() { if(!currentServer) return; const r = await fetch(`/api/files/list/${currentServer.folder}`); const files = await r.json(); const pyFiles = files.filter(f=>f.name.endsWith('.py')&&!f.is_dir); const select = document.getElementById('startupFileSelect'); if(select) select.innerHTML = '<option value="">-- اختر ملف التشغيل --</option>'+pyFiles.map(f=>`<option value="${f.name}" ${currentServer.startup_file===f.name?'selected':''}>${f.name}</option>`).join(''); }

    async function logout() { await fetch('/api/logout', { method:'POST' }); window.location.href = '/login'; }
    function escapeHtml(s) { return String(s).replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

    document.getElementById('openCreateModalBtn').onclick = showPlansModal;
    checkAuth();
</script>
</body>
</html>
