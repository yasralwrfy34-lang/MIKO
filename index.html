<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>لوحة التحكم | MIKO HOST</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --blue: #2d7aff;
            --blue-dim: rgba(45,122,255,0.15);
            --blue-glow: rgba(45,122,255,0.4);
            --cyan: #00e5ff;
            --cyan-dim: rgba(0,229,255,0.12);
            --cyan-glow: rgba(0,229,255,0.3);
            --dark: #080b10;
            --dark2: #0c0f18;
            --dark3: #111520;
            --green: #00ff88;
            --red: #ff3d5a;
            --amber: #ffb800;
            --border: rgba(45,122,255,0.18);
            --text: #e0e4f0;
            --muted: #7a8099;
        }
        * { margin:0;padding:0;box-sizing:border-box; }
        body { font-family:'Tajawal',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden; }

        .bg-glow { position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(45,122,255,0.08),transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(0,229,255,0.05),transparent 60%);pointer-events:none;z-index:-2; }
        .bg-grid {
            position:fixed;inset:0;
            background-image:linear-gradient(rgba(45,122,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(45,122,255,0.05) 1px,transparent 1px);
            background-size:48px 48px;pointer-events:none;z-index:-1;
        }

        .navbar {
            background:rgba(8,11,16,0.9);
            backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            padding:12px 28px;
            display:flex;justify-content:space-between;align-items:center;
            position:sticky;top:0;z-index:50;
        }
        .logo { display:flex;align-items:center;gap:10px; }
        .logo-icon {
            width:34px;height:34px;
            background:linear-gradient(135deg,var(--dark2),var(--dark3));
            border:1px solid var(--cyan);
            border-radius:10px;
            display:flex;align-items:center;justify-content:center;
            font-size:16px;color:var(--cyan);
            box-shadow:0 0 10px var(--cyan-glow);
        }
        .logo-text { font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--blue);text-shadow:0 0 12px var(--blue-glow); }
        .user-section { display:flex;align-items:center;gap:18px; }
        .user-greeting { font-size:0.78rem;color:var(--muted); }
        .user-greeting strong { color:var(--cyan);font-weight:600; }
        .logout-btn {
            background:rgba(45,122,255,0.1);border:1px solid rgba(45,122,255,0.3);
            color:var(--blue);padding:6px 16px;border-radius:40px;
            font-size:0.72rem;font-weight:600;cursor:pointer;transition:all .2s;
            display:flex;align-items:center;gap:8px;font-family:'Tajawal',sans-serif;
        }
        .logout-btn:hover { background:rgba(45,122,255,0.22);transform:translateY(-1px); }

        .container { max-width:1280px;margin:0 auto;padding:28px 24px; }

        .stats-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:36px; }
        .stat-card {
            background:rgba(12,15,24,0.8);
            backdrop-filter:blur(8px);
            border:1px solid rgba(45,122,255,0.12);
            border-radius:22px;padding:20px 18px;transition:all .25s;
        }
        .stat-card:hover { border-color:rgba(45,122,255,0.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(45,122,255,0.1); }
        .stat-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:12px; }
        .stat-icon {
            width:40px;height:40px;
            background:var(--blue-dim);
            border:1px solid rgba(45,122,255,0.2);
            border-radius:14px;display:flex;align-items:center;justify-content:center;
            font-size:1.1rem;color:var(--blue);
        }
        .stat-value { font-size:1.8rem;font-weight:700;letter-spacing:-.5px;color:#fff;line-height:1.2; }
        .stat-label { font-size:0.68rem;color:var(--muted);margin-top:5px;letter-spacing:.3px; }

        .section-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px; }
        .section-title { font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:8px; }
        .section-title i { color:var(--blue); }
        .create-btn {
            background:linear-gradient(135deg,var(--blue),#1a5cd8);
            border:none;padding:8px 20px;border-radius:40px;
            font-family:'Tajawal',sans-serif;font-weight:700;font-size:0.75rem;
            color:#fff;cursor:pointer;transition:all .2s;
            display:flex;align-items:center;gap:8px;
            box-shadow:0 4px 14px rgba(45,122,255,0.3);
        }
        .create-btn:hover { transform:translateY(-2px);box-shadow:0 8px 20px rgba(45,122,255,0.45); }

        .servers-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px; }
        .server-card {
            background:rgba(11,14,22,0.85);
            border:1px solid rgba(45,122,255,0.12);
            border-radius:22px;padding:20px;cursor:pointer;transition:all .25s;
        }
        .server-card:hover { border-color:rgba(45,122,255,0.45);transform:translateY(-3px);box-shadow:0 10px 28px rgba(45,122,255,0.12); }
        .server-icon { font-size:1.8rem;margin-bottom:12px;color:var(--blue); }
        .server-name { font-size:1rem;font-weight:700;margin-bottom:6px; }
        .server-meta { display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:0.68rem;color:var(--muted); }
        .server-port { background:var(--blue-dim);border:1px solid rgba(45,122,255,0.2);padding:2px 10px;border-radius:20px;font-size:0.64rem;color:var(--blue); }
        .server-status { display:inline-flex;align-items:center;gap:6px;font-size:0.68rem;font-weight:600;padding:4px 12px;border-radius:30px;width:fit-content; }
        .status-online { background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.2); }
        .status-offline { background:rgba(122,128,153,0.12);color:var(--muted);border:1px solid rgba(122,128,153,0.2); }
        .status-dot { width:6px;height:6px;border-radius:50%; }
        .dot-online { background:var(--green);box-shadow:0 0 6px var(--green); }
        .dot-offline { background:var(--muted); }

        .server-detail { display:none;animation:fadeIn .25s ease; }
        .server-detail.active { display:block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .detail-header { display:flex;align-items:center;gap:20px;margin-bottom:28px;flex-wrap:wrap; }
        .back-btn {
            background:rgba(45,122,255,0.08);border:1px solid rgba(45,122,255,0.2);
            padding:8px 18px;border-radius:40px;font-size:0.75rem;font-weight:600;
            cursor:pointer;transition:.2s;display:flex;align-items:center;gap:8px;
            color:var(--blue);font-family:'Tajawal',sans-serif;
        }
        .back-btn:hover { background:rgba(45,122,255,0.18); }
        .server-title { font-size:1.2rem;font-weight:700; }

        .tabs { display:flex;gap:12px;margin-bottom:28px;border-bottom:1px solid rgba(45,122,255,0.12);padding-bottom:8px; }
        .tab-btn { background:transparent;border:none;padding:8px 4px;font-family:'Tajawal',sans-serif;font-weight:600;font-size:0.8rem;color:var(--muted);cursor:pointer;transition:.2s;position:relative; }
        .tab-btn.active { color:var(--blue); }
        .tab-btn.active::after { content:'';position:absolute;bottom:-9px;right:0;width:100%;height:2px;background:linear-gradient(90deg,var(--blue),rgba(45,122,255,0));border-radius:2px; }

        .console-box {
            background:#040609;
            border:1px solid rgba(45,122,255,0.2);
            border-radius:18px;padding:18px;height:320px;
            overflow-y:auto;font-family:'Menlo','Courier New',monospace;
            font-size:0.7rem;line-height:1.5;color:#b0f0b0;white-space:pre-wrap;margin-bottom:22px;
        }
        .info-row { display:flex;flex-wrap:wrap;gap:12px;margin-bottom:22px; }
        .info-chip {
            background:var(--blue-dim);border:1px solid rgba(45,122,255,0.2);
            border-radius:40px;padding:7px 16px;
            display:flex;align-items:center;gap:10px;font-size:0.73rem;
        }
        .info-chip span:first-child { color:var(--muted); }
        .info-chip span:last-child { font-weight:600;color:var(--text); }

        .action-buttons { display:flex;flex-wrap:wrap;gap:10px;margin:20px 0 28px; }
        .action-btn {
            padding:8px 20px;border-radius:40px;font-size:0.7rem;font-weight:600;
            font-family:'Tajawal',sans-serif;border:none;cursor:pointer;transition:.2s;
            display:flex;align-items:center;gap:8px;
        }
        .btn-start { background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.25); }
        .btn-start:hover { background:rgba(0,255,136,0.22);transform:translateY(-1px); }
        .btn-stop { background:rgba(255,61,90,0.1);color:var(--red);border:1px solid rgba(255,61,90,0.25); }
        .btn-stop:hover { background:rgba(255,61,90,0.22); }
        .btn-restart { background:rgba(255,184,0,0.1);color:var(--amber);border:1px solid rgba(255,184,0,0.25); }
        .btn-restart:hover { background:rgba(255,184,0,0.22); }
        .btn-delete { background:rgba(255,61,90,0.1);color:var(--red);border:1px solid rgba(255,61,90,0.25); }

        .files-table { width:100%;border-collapse:collapse;font-size:0.75rem; }
        .files-table th { text-align:right;padding:12px 8px;color:var(--muted);font-weight:500;border-bottom:1px solid rgba(45,122,255,0.1); }
        .files-table td { padding:12px 8px;border-bottom:1px solid rgba(45,122,255,0.06); }
        .file-checkbox { width:16px;height:16px;accent-color:var(--blue); }
        .file-actions { display:flex;gap:8px; }
        .file-btn { background:transparent;border:none;font-size:0.7rem;cursor:pointer;padding:4px 8px;border-radius:20px;transition:.2s;font-family:'Tajawal',sans-serif; }
        .file-edit { color:#c084fc;background:rgba(192,132,252,0.1); }
        .file-delete { color:var(--red);background:rgba(255,61,90,0.08); }
        .upload-zone {
            border:1px dashed rgba(45,122,255,0.35);
            background:rgba(45,122,255,0.02);
            border-radius:22px;padding:28px;text-align:center;
            margin-bottom:22px;cursor:pointer;transition:.2s;color:var(--muted);
        }
        .upload-zone:hover { border-color:var(--blue);background:rgba(45,122,255,0.05);color:var(--blue); }

        .modal { display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:1000;align-items:center;justify-content:center; }
        .modal.active { display:flex; }
        .modal-content {
            background:var(--dark2);
            border:1px solid rgba(45,122,255,0.3);
            border-radius:28px;width:90%;max-width:540px;padding:28px;
            box-shadow:0 0 40px rgba(45,122,255,0.1);
        }
        .modal-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:20px; }
        .modal-title { font-weight:700;font-size:1rem;color:var(--blue); }
        .modal-close { background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer; }
        .modal-close:hover { color:var(--blue); }

        textarea, input[type="text"], input[type="password"] {
            background:rgba(4,6,9,0.8);
            border:1px solid rgba(45,122,255,0.25);
            border-radius:18px;padding:12px 16px;
            color:var(--text);font-family:'Tajawal',monospace;
            font-size:0.75rem;width:100%;
            outline:none;transition:border-color .3s;
        }
        textarea:focus, input:focus { border-color:var(--blue);box-shadow:0 0 0 2px rgba(45,122,255,0.1); }

        .toast {
            position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
            background:var(--dark2);border:1px solid var(--blue);
            padding:10px 24px;border-radius:60px;font-size:0.75rem;
            z-index:1100;display:none;backdrop-filter:blur(12px);
            box-shadow:0 8px 24px rgba(45,122,255,0.2);color:var(--text);
        }
        .animated-emoji {
            display: inline-block;
            animation: bounce 1s infinite ease-in-out;
            margin-left: 4px;
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        @media(max-width:720px) {
            .stats-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
            .container{padding:20px 16px;}
            .stat-value{font-size:1.5rem;}
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>

    <div class="navbar">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-server"></i></div>
            <span class="logo-text">MIKO HOST</span>
        </div>
        <div class="user-section">
            <div class="user-greeting"><i class="far fa-user-circle"></i> مرحباً، <strong id="username">...</strong> <span style="color:var(--cyan);font-size:0.68rem;">@I_tt_6</span></div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>

    <div class="container" id="appContainer">
        <div id="homeView">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-header"><div class="stat-icon"><i class="fas fa-server"></i></div></div><div class="stat-value" id="usedServers">0/0</div><div class="stat-label">السيرفرات المستخدمة <span class="animated-emoji">🖥️</span></div></div>
                <div class="stat-card"><div class="stat-header"><div class="stat-icon"><i class="fas fa-calendar-alt"></i></div></div><div class="stat-value" id="expiryDays">--</div><div class="stat-label">المتبقي من الصلاحية <span class="animated-emoji">📅</span></div></div>
                <div class="stat-card"><div class="stat-header"><div class="stat-icon"><i class="fas fa-microchip"></i></div></div><div class="stat-value" id="cpuMetric">0%</div><div class="stat-label">استخدام المعالج <span class="animated-emoji">⚙️</span></div></div>
                <div class="stat-card"><div class="stat-header"><div class="stat-icon"><i class="fas fa-memory"></i></div></div><div class="stat-value" id="ramMetric">0%</div><div class="stat-label">الذاكرة <span class="animated-emoji">💾</span></div></div>
            </div>
            <div class="section-header">
                <div class="section-title"><i class="fas fa-cubes"></i> السيرفرات النشطة</div>
                <button class="create-btn" onclick="createNewServer()"><i class="fas fa-plus"></i> سيرفر جديد</button>
            </div>
            <div class="servers-grid" id="serversGrid"><div style="text-align:center;padding:40px;color:var(--muted)">جاري التحميل...</div></div>
        </div>

        <div id="detailView" class="server-detail">
            <div class="detail-header">
                <button class="back-btn" onclick="goHome()"><i class="fas fa-arrow-right"></i> العودة</button>
                <div class="server-title" id="detailTitle"></div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('console')">الكونسول</button>
                <button class="tab-btn" onclick="switchTab('files')">الملفات</button>
            </div>
            <div id="consoleTab">
                <div class="console-box" id="consoleOut"></div>
                <div class="info-row" id="statusRow"></div>
                <div class="action-buttons">
                    <button class="action-btn btn-start" onclick="serverAction('start')"><i class="fas fa-play"></i> تشغيل</button>
                    <button class="action-btn btn-restart" onclick="serverAction('restart')"><i class="fas fa-sync-alt"></i> إعادة تشغيل</button>
                    <button class="action-btn btn-stop" onclick="serverAction('stop')"><i class="fas fa-stop"></i> إيقاف</button>
                    <button class="action-btn btn-delete" onclick="confirmDelete()"><i class="fas fa-trash"></i> حذف</button>
                </div>
            </div>
            <div id="filesTab" style="display:none;">
                <div class="upload-zone" onclick="document.getElementById('fileUpload').click()" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
                    <i class="fas fa-cloud-upload-alt"></i> اسحب الملفات أو انقر للرفع
                </div>
                <input type="file" id="fileUpload" multiple style="display:none" onchange="uploadFiles(this.files)">
                <div class="action-buttons" style="margin-top:8px">
                    <button class="action-btn btn-start" style="background:rgba(45,122,255,0.08)" onclick="installPackages()"><i class="fas fa-cube"></i> تثبيت المكتبات</button>
                    <button class="action-btn btn-start" style="background:rgba(45,122,255,0.08)" onclick="showCreateFileModal()"><i class="fas fa-file"></i> ملف جديد</button>
                </div>
                <table class="files-table">
                    <thead><tr><th style="width:30px"></th><th>الاسم</th><th>الحجم</th><th></th></tr></thead>
                    <tbody id="filesList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="editorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span class="modal-title" id="editorFileName"></span><button class="modal-close" onclick="closeEditor()">✕</button></div>
            <textarea id="editorArea" rows="12"></textarea>
            <div style="margin-top:16px"><button class="create-btn" style="width:100%" onclick="saveFile()">حفظ التغييرات</button></div>
        </div>
    </div>
    <div id="confirmModal" class="modal">
        <div class="modal-content" style="max-width:340px">
            <div class="modal-header"><span class="modal-title">تأكيد</span></div>
            <p id="confirmMsg" style="margin:16px 0;color:var(--muted)">هل أنت متأكد؟</p>
            <div style="display:flex;gap:12px">
                <button class="create-btn" style="background:var(--red);box-shadow:0 4px 14px rgba(255,61,90,.3)" id="confirmYesBtn">تأكيد</button>
                <button class="logout-btn" onclick="closeConfirm()">إلغاء</button>
            </div>
        </div>
    </div>
    <div id="createFileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><span class="modal-title">ملف جديد</span><button class="modal-close" onclick="closeCreateFileModal()">✕</button></div>
            <input type="text" id="newFileName" placeholder="الاسم (مثال: main.py)" style="margin-bottom:12px">
            <textarea id="newFileContent" rows="4" placeholder="المحتوى (اختياري)"></textarea>
            <div style="margin-top:16px"><button class="create-btn" style="width:100%" onclick="createFile()">إنشاء</button></div>
        </div>
    </div>

    <script>
        let currentServer=null, polling=null, currentFile=null, confirmAction=null;
        const showToast=(msg,type='info')=>{const t=document.getElementById('toast');t.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-info-circle'}"></i> ${msg}`;t.style.display='block';setTimeout(()=>t.style.display='none',3000);};
        const showConfirm=(msg,cb)=>{document.getElementById('confirmMsg').innerText=msg;confirmAction=cb;document.getElementById('confirmModal').classList.add('active');};
        const closeConfirm=()=>{document.getElementById('confirmModal').classList.remove('active');confirmAction=null;};
        const executeConfirm=()=>{if(confirmAction)confirmAction();closeConfirm();};
        document.getElementById('confirmYesBtn').onclick=executeConfirm;

        async function checkAuth(){
            try{
                const r=await fetch('/api/current_user');
                const d=await r.json();
                if(!d.success) window.location.href='/login';
                else {
                    document.getElementById('username').innerText=d.username;
                    loadServers();
                    fetchMetrics();
                    setInterval(fetchMetrics,8000);
                }
            } catch(e){ window.location.href='/login'; }
        }

        async function fetchMetrics(){
            try{
                const r=await fetch('/api/system/metrics');
                const d=await r.json();
                document.getElementById('cpuMetric').innerText=d.cpu+'%';
                document.getElementById('ramMetric').innerText=d.memory+'%';
            } catch(e){}
        }

        async function loadServers(){
            try{
                const r=await fetch('/api/servers');
                const d=await r.json();
                if(!d.success) return;
                document.getElementById('usedServers').innerText=`${d.stats.used}/${d.stats.total}`;
                document.getElementById('expiryDays').innerText=d.stats.expiry;
                const grid=document.getElementById('serversGrid');
                if(d.servers.length===0){
                    grid.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">لا توجد سيرفرات، أنشئ واحداً</div>';
                    return;
                }
                grid.innerHTML='';
                d.servers.forEach(s=>{
                    const card=document.createElement('div');
                    card.className='server-card';
                    card.innerHTML=`
                        <div class="server-icon"><i class="fas fa-cube"></i></div>
                        <div class="server-name">${escapeHtml(s.title)}</div>
                        <div class="server-meta"><span class="server-port"><i class="fas fa-plug"></i> ${s.port||'N/A'}</span></div>
                        <div class="server-status ${s.status==='Running'?'status-online':'status-offline'}"><span class="status-dot ${s.status==='Running'?'dot-online':'dot-offline'}"></span>${s.status==='Running'?'يعمل':'متوقف'}</div>
                    `;
                    card.onclick=()=>openServer(s);
                    grid.appendChild(card);
                });
            } catch(e){ showToast('خطأ في تحميل السيرفرات','error'); }
        }

        function openServer(s){
            currentServer=s;
            document.getElementById('homeView').style.display='none';
            document.getElementById('detailView').classList.add('active');
            document.getElementById('detailTitle').innerHTML=`<i class="fas fa-server" style="color:var(--blue)"></i> ${escapeHtml(s.title)}`;
            switchTab('console');
            if(polling) clearInterval(polling);
            fetchStats();
            polling=setInterval(fetchStats,4000);
        }

        async function fetchStats(){
            if(!currentServer) return;
            try{
                const r=await fetch(`/api/server/stats/${currentServer.folder}`);
                const d=await r.json();
                if(!d.success) return;
                document.getElementById('consoleOut').innerText=d.logs||'لا توجد مخرجات';
                document.getElementById('consoleOut').scrollTop=document.getElementById('consoleOut').scrollHeight;
                document.getElementById('statusRow').innerHTML=`
                    <div class="info-chip"><span>الحالة</span><span>${d.status==='Running'?'🟢 يعمل':'⚫ متوقف'}</span></div>
                    <div class="info-chip"><span>الذاكرة</span><span>${d.mem||'0 MB'}</span></div>
                    <div class="info-chip"><span>وقت التشغيل</span><span>${d.uptime||'0'}</span></div>
                    <div class="info-chip"><span>المنفذ</span><span>${d.port||'N/A'}</span></div>
                `;
            } catch(e){}
        }

        async function serverAction(act){
            if(act==='delete'){ confirmDelete(); return; }
            showToast(`جاري ${act==='start'?'التشغيل':act==='stop'?'الإيقاف':'إعادة التشغيل'}...`);
            try{
                const r=await fetch(`/api/server/action/${currentServer.folder}/${act}`,{method:'POST'});
                const d=await r.json();
                if(d.success){
                    showToast(d.message,'success');
                    if(act!=='stop') setTimeout(fetchStats,1000);
                } else showToast(d.message||'فشل العملية','error');
            } catch(e){ showToast('خطأ في الاتصال','error'); }
        }

        function confirmDelete(){
            showConfirm('⚠️ حذف السيرفر نهائياً؟ لا يمكن التراجع', async()=>{
                const r=await fetch(`/api/server/action/${currentServer.folder}/delete`,{method:'POST'});
                const d=await r.json();
                if(d.success){
                    showToast('تم الحذف','success');
                    if(polling) clearInterval(polling);
                    goHome();
                } else showToast(d.message||'فشل الحذف','error');
            });
        }

        function goHome(){
            document.getElementById('homeView').style.display='block';
            document.getElementById('detailView').classList.remove('active');
            if(polling) clearInterval(polling);
            currentServer=null;
            loadServers();
        }

        function switchTab(t){
            const con=document.getElementById('consoleTab'), fil=document.getElementById('filesTab');
            const btns=document.querySelectorAll('.tab-btn');
            if(t==='console'){
                con.style.display='block'; fil.style.display='none';
                btns[0].classList.add('active'); btns[1].classList.remove('active');
            } else {
                con.style.display='none'; fil.style.display='block';
                btns[0].classList.remove('active'); btns[1].classList.add('active');
                loadFiles();
            }
        }

        async function loadFiles(){
            const tbody=document.getElementById('filesList');
            tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--muted)">جاري...</td></tr>';
            try{
                const r=await fetch(`/api/files/list/${currentServer.folder}`);
                const files=await r.json();
                if(files.length===0){
                    tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--muted)">لا توجد ملفات</td></tr>';
                    return;
                }
                tbody.innerHTML=files.map(f=>`
                    <tr>
                        <td><input type="checkbox" class="file-checkbox" value="${escapeHtml(f.name)}"></td>
                        <td><i class="fas ${f.is_dir?'fa-folder':'fa-file'}" style="color:var(--blue)"></i> ${escapeHtml(f.name)}</td>
                        <td>${f.size}</td>
                        <td class="file-actions">
                            ${!f.is_dir?`<button class="file-btn file-edit" onclick="editFile('${escapeHtml(f.name)}')"><i class="fas fa-edit"></i> تعديل</button>`:''}
                            ${f.name.toLowerCase().endsWith('.zip')?`<button class="file-btn" style="color:var(--cyan);background:rgba(0,229,255,0.1)" onclick="unzipFile('${escapeHtml(f.name)}')"><i class="fas fa-file-archive"></i> فك الضغط</button>`:''}
                            <button class="file-btn file-delete" onclick="deleteFile('${escapeHtml(f.name)}')"><i class="fas fa-trash"></i> حذف</button>
                        </td>
                    </tr>
                `).join('');
            } catch(e){ tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--muted)">خطأ في التحميل</td></tr>'; }
        }

        async function editFile(name){
            currentFile=name;
            const r=await fetch(`/api/files/content/${currentServer.folder}/${name}`);
            const d=await r.json();
            document.getElementById('editorFileName').innerText=name;
            document.getElementById('editorArea').value=d.content||'';
            document.getElementById('editorModal').classList.add('active');
        }
        async function saveFile(){
            if(!currentFile) return;
            const content=document.getElementById('editorArea').value;
            const r=await fetch(`/api/files/save/${currentServer.folder}/${currentFile}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content})});
            const d=await r.json();
            if(d.success){ showToast('تم الحفظ','success'); closeEditor(); loadFiles(); }
            else showToast('فشل الحفظ','error');
        }
        function closeEditor(){ document.getElementById('editorModal').classList.remove('active'); currentFile=null; }
        async function deleteFile(name){
            showConfirm(`حذف ${name}؟`, async()=>{
                const r=await fetch(`/api/files/delete/${currentServer.folder}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({names:[name]})});
                const d=await r.json();
                if(d.success){ showToast('تم الحذف','success'); loadFiles(); }
                else showToast(d.message||'فشل','error');
            });
        }
        async function uploadFiles(files){
            if(!files.length) return;
            const fd=new FormData();
            for(let f of files) fd.append('files[]',f);
            const r=await fetch(`/api/files/upload/${currentServer.folder}`,{method:'POST',body:fd});
            const d=await r.json();
            if(d.success){ showToast(d.message,'success'); loadFiles(); }
            else showToast('فشل الرفع','error');
            document.getElementById('fileUpload').value='';
        }
        function handleDrop(e){ e.preventDefault(); uploadFiles(e.dataTransfer.files); }
        async function installPackages(){
            showToast('بدء تثبيت المكتبات...');
            const r=await fetch(`/api/server/install/${currentServer.folder}`,{method:'POST'});
            const d=await r.json();
            showToast(d.message,d.success?'success':'error');
        }
        function showCreateFileModal(){ document.getElementById('newFileName').value=''; document.getElementById('newFileContent').value=''; document.getElementById('createFileModal').classList.add('active'); }
        function closeCreateFileModal(){ document.getElementById('createFileModal').classList.remove('active'); }
        async function unzipFile(name){
            showToast('جاري فك الضغط...');
            const r=await fetch(`/api/files/unzip/${currentServer.folder}/${name}`,{method:'POST'});
            const d=await r.json();
            if(d.success){ showToast(d.message,'success'); loadFiles(); }
            else showToast(d.message||'فشل','error');
        }
        async function createFile(){
            const name=document.getElementById('newFileName').value.trim();
            const content=document.getElementById('newFileContent').value;
            if(!name){ showToast('أدخل اسم الملف'); return; }
            const r=await fetch(`/api/files/create/${currentServer.folder}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:name,content})});
            const d=await r.json();
            if(d.success){ showToast(d.message,'success'); closeCreateFileModal(); loadFiles(); }
            else showToast(d.message||'فشل','error');
        }
        async function createNewServer(){
            const name=prompt('اسم السيرفر الجديد:');
            if(!name) return;
            showToast('جاري الإنشاء...');
            try{
                const r=await fetch('/api/server/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
                const d=await r.json();
                if(d.success){ showToast(d.message,'success'); loadServers(); }
                else showToast(d.message||'فشل الإنشاء','error');
            } catch(e){ showToast('خطأ في الاتصال','error'); }
        }
        async function logout(){
            showConfirm('تسجيل الخروج؟', async()=>{
                await fetch('/api/logout',{method:'POST'});
                window.location.href='/login';
            });
        }
        function escapeHtml(s){ return String(s).replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        checkAuth();
    </script>
</body>
</html>
